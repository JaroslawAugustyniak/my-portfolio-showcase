services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    expose:
      - "8080"
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    environment:
      - NODE_ENV=development
      - VIRTUAL_HOST=portfolio.localhost
      - VIRTUAL_PORT=8080
    networks:
      - default
      - nginx-proxy-network
      - wp

networks:
  nginx-proxy-network:
    external: true
    name: nginx-proxy-network
  wp:
    external: true
    name: wp
